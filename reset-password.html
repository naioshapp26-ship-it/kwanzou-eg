<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Reset Password | Kwanzou EG</title>
  <link rel="icon" href="assets/logo-brand.svg?v=6" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=11">
  <link rel="stylesheet" href="css/auth.css?v=3">
</head>
<body class="auth-page" data-page-title="reset_title">
  <div class="auth-lang"><button type="button" class="lang-switch" id="langSwitch">English</button></div>
  <div class="auth-split auth-split--single">
    <div class="auth-form-panel auth-form-panel--full">
      <a href="login.html" class="auth-back" data-i18n="forgot_back_login">← Back to Sign In</a>
      <div class="auth-form-wrap">
        <a href="index.html" class="logo-link-auth logo-link-auth--inline">
          <img src="assets/logo-brand.svg?v=6" alt="Kwanzou EG" class="auth-logo">
        </a>
        <h1 data-i18n="reset_heading">Set New Password</h1>
        <p class="auth-sub" data-i18n="reset_sub">Choose a new password for your account.</p>
        <div class="auth-alert" id="authError" hidden></div>
        <div class="auth-alert auth-alert--success" id="authSuccess" hidden></div>
        <form id="resetForm" class="auth-form" hidden>
          <div class="form-group">
            <label for="password" data-i18n="account_new_password">New Password</label>
            <input type="password" id="password" required minlength="6" autocomplete="new-password">
          </div>
          <div class="form-group">
            <label for="confirmPassword" data-i18n="account_confirm_new_password">Confirm New Password</label>
            <input type="password" id="confirmPassword" required minlength="6" autocomplete="new-password">
          </div>
          <button type="submit" class="btn btn-primary btn-full" data-i18n="reset_submit">Update Password</button>
        </form>
        <p class="auth-switch" id="invalidTokenMsg" hidden>
          <span data-i18n="reset_invalid">This reset link is invalid or expired.</span>
          <a href="forgot-password.html" data-i18n="forgot_heading">Request a new link</a>
        </p>
      </div>
    </div>
  </div>

  <script src="js/store.js?v=15"></script>
  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/password-toggle.js"></script>
  <script>
    (async () => {
      LumiereI18n.init();
      LumiereI18n.bindLangSwitch();
      await LumiereStore.init();
      PasswordToggle.init();
      window.addEventListener('lumiere:langchange', () => LumiereI18n.applyTranslations());

      const token = new URLSearchParams(location.search).get('token');
      const form = document.getElementById('resetForm');
      const errEl = document.getElementById('authError');
      const okEl = document.getElementById('authSuccess');
      const invalidEl = document.getElementById('invalidTokenMsg');

      if (!token || !(await LumiereAuth.validateResetToken(token))) {
        invalidEl.hidden = false;
        return;
      }

      form.hidden = false;

      form.addEventListener('submit', async e => {
        e.preventDefault();
        errEl.hidden = true;
        okEl.hidden = true;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        if (password !== confirmPassword) {
          errEl.textContent = LumiereI18n.t('account_password_mismatch');
          errEl.hidden = false;
          return;
        }
        const result = await LumiereAuth.resetPassword(token, password);
        if (!result.ok) {
          errEl.textContent = LumiereI18n.t(result.error || 'reset_invalid');
          errEl.hidden = false;
          return;
        }
        form.hidden = true;
        okEl.innerHTML = `${LumiereI18n.t('reset_password_done')} <a href="login.html">${LumiereI18n.t('register_signin')}</a>`;
        okEl.hidden = false;
      });
    })();
  </script>
</body>
</html>
