<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 110" width="400" height="110" role="img" aria-label="Kwanzou Accessories">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8D08A"/>
      <stop offset="50%" stop-color="#C9A962"/>
      <stop offset="100%" stop-color="#A8893E"/>
    </linearGradient>
    <linearGradient id="goldH" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#A8893E"/>
      <stop offset="50%" stop-color="#F0DCA0"/>
      <stop offset="100%" stop-color="#A8893E"/>
    </linearGradient>
    <radialGradient id="pearl" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E5DDD0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-10%" width="140%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#2C2420" flood-opacity="0.12"/>
    </filter>
  </defs>

  <g transform="translate(58, 58)" filter="url(#softShadow)">
    <!-- single subtle ring -->
    <circle r="50" fill="none" stroke="url(#gold)" stroke-width="1.6" opacity="0.7"/>

    <!-- silhouette -->
    <g fill="#2C2420">
      <ellipse cx="14" cy="-28" rx="13" ry="11"/>
      <path d="M 26 -36 C 10 -36, -2 -26, -6 -12 C -9 -2, -6 8, 2 12 C 8 15, 14 14, 18 10 C 20 6, 18 0, 14 -6 C 10 -14, 16 -24, 26 -28 Z"/>
      <path d="M 6 12 C 4 20, 6 28, 12 34 C 20 40, 34 42, 44 38 C 52 35, 56 30, 54 24 C 48 26, 38 28, 28 24 C 18 20, 12 16, 6 12 Z"/>
      <path d="M 18 10 C 14 4, 8 0, 2 -4 C -2 -6, -6 -4, -8 0 C -10 6, -8 12, -2 16 C 2 18, 8 16, 12 12 C 14 10, 16 10, 18 10 Z"/>
      <path d="M -2 16 C -6 20, -8 24, -6 28 C -4 30, 0 30, 2 28 C 4 24, 2 20, -2 16 Z"/>
    </g>

    <!-- simple jewelry: earring · necklace · bracelet · ring -->
    <!-- hoop earring -->
    <circle cx="-5" cy="-5" r="6.5" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <circle cx="-5" cy="5" r="2.2" fill="url(#pearl)" stroke="url(#gold)" stroke-width="1"/>

    <!-- one necklace + pendant -->
    <path d="M 0 14 Q 12 30 26 18" fill="none" stroke="url(#gold)" stroke-width="1.8"/>
    <ellipse cx="14" cy="28" rx="6" ry="7.5" fill="url(#pearl)" stroke="url(#gold)" stroke-width="1.6"/>

    <!-- one bracelet -->
    <ellipse cx="-5" cy="32" rx="9" ry="3" fill="none" stroke="url(#gold)" stroke-width="2.2"/>

    <!-- one ring -->
    <ellipse cx="-3" cy="22" rx="2.5" ry="1.8" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
    <circle cx="-3" cy="22" r="1.2" fill="url(#pearl)"/>
  </g>

  <!-- wordmark -->
  <text x="128" y="50" font-family="'Segoe Script', 'Brush Script MT', 'Cormorant Garamond', cursive" font-size="44" font-weight="600" fill="#2C2420">Kwanzou</text>
  <rect x="130" y="58" width="118" height="2" rx="1" fill="url(#goldH)"/>
  <text x="130" y="78" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-weight="700" fill="url(#gold)" letter-spacing="8">ACCESSORIES</text>
</svg>
