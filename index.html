<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Kwanzou EG — إكسسوارات، شنط، برفانات وأكتر في مصر.">
  <title>Kwanzou EG | متجر إكسسوارات</title>
  <link rel="icon" href="assets/logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/shop.css">
  <link rel="stylesheet" href="css/catalog.css">
</head>
<body class="catalog-store" data-page-title="meta_title">
  <div id="site-header"></div>

  <main class="catalog-main">
    <section class="catalog-banner">
      <h2 data-i18n="home_collection_title">NEW EXCLUSIVE COLLECTION</h2>
      <p data-i18n="home_collection_desc">New Exclusive Collection with new designs</p>
    </section>

    <section class="catalog-section">
      <div class="container">
        <ul class="products" id="catalogProducts"></ul>
      </div>
    </section>

    <section class="catalog-section">
      <div class="container">
        <div class="category-cloud" id="categoryCloud"></div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <div class="toast" id="toast"><span id="toastMessage"></span></div>

  <script src="js/store.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
