<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product | Kwanzou EG</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/shop.css">
</head>
<body data-page-title="product_title">
  <div id="site-header"></div>

  <main class="product-page" id="productPage">
    <div class="container">
      <nav class="breadcrumb" id="breadcrumb"></nav>
      <div class="product-detail" id="productDetail"></div>
      <section class="product-tabs" id="productTabs"></section>
      <section class="related-section">
        <h2 data-i18n="related_products">Related Products</h2>
        <div class="products-grid products-grid--4" id="relatedGrid"></div>
      </section>
    </div>
  </main>

  <div id="site-footer"></div>
  <div class="toast" id="toast"><span id="toastMessage"></span></div>

  <script src="js/store.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/product.js"></script>
</body>
</html>
