<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="420" height="100" role="img" aria-label="Kwanzou Concept 2">
  <defs>
    <linearGradient id="v2gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF3CC"/>
      <stop offset="30%" stop-color="#E5C978"/>
      <stop offset="60%" stop-color="#C9A962"/>
      <stop offset="100%" stop-color="#8B7128"/>
    </linearGradient>
    <linearGradient id="v2ring" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0DCA0"/>
      <stop offset="100%" stop-color="#A8893E"/>
    </linearGradient>
    <radialGradient id="v2core" cx="45%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="40%" stop-color="#F5E6B8"/>
      <stop offset="100%" stop-color="#9A7B30"/>
    </radialGradient>
    <filter id="v2shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#2C2420" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Ornate medallion mark -->
  <g transform="translate(50, 50)" filter="url(#v2shadow)">
    <!-- outer ring -->
    <circle r="42" fill="none" stroke="url(#v2gold)" stroke-width="3"/>
    <circle r="36" fill="none" stroke="url(#v2ring)" stroke-width="1.2" opacity="0.6"/>
    <!-- sunburst rays -->
    <g fill="url(#v2gold)" opacity="0.9">
      <rect x="-1.2" y="-44" width="2.4" height="10" rx="1"/>
      <rect x="-1.2" y="34" width="2.4" height="10" rx="1"/>
      <rect x="-44" y="-1.2" width="10" height="2.4" rx="1"/>
      <rect x="34" y="-1.2" width="10" height="2.4" rx="1"/>
      <rect x="-1.2" y="-44" width="2.4" height="10" rx="1" transform="rotate(45)"/>
      <rect x="-1.2" y="-44" width="2.4" height="10" rx="1" transform="rotate(90)"/>
      <rect x="-1.2" y="-44" width="2.4" height="10" rx="1" transform="rotate(135)"/>
      <rect x="-1.2" y="-44" width="2.4" height="10" rx="1" transform="rotate(22.5)"/>
      <rect x="-1.2" y="-44" width="2.4" height="10" rx="1" transform="rotate(67.5)"/>
      <rect x="-1.2" y="-44" width="2.4" height="10" rx="1" transform="rotate(112.5)"/>
      <rect x="-1.2" y="-44" width="2.4" height="10" rx="1" transform="rotate(157.5)"/>
    </g>
    <!-- gem hexagon center -->
    <path d="M 0 -18 L 16 -9 L 16 9 L 0 18 L -16 9 L -16 -9 Z" fill="url(#v2core)" stroke="url(#v2gold)" stroke-width="2"/>
    <!-- K inside gem -->
    <path fill="#2C2420" d="M -7 -12 L -7 12 L -1 12 L -1 1 L 9 12 L 16 12 L 3 0 L 14 -12 L 7 -12 L -1 -1 L -1 -12 Z"/>
    <!-- dangling drops like earrings -->
    <line x1="-28" y1="28" x2="-28" y2="38" stroke="url(#v2gold)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="-28" cy="40" r="3.5" fill="url(#v2core)" stroke="url(#v2gold)" stroke-width="1.2"/>
    <line x1="28" y1="28" x2="28" y2="38" stroke="url(#v2gold)" stroke-width="2" stroke-linecap="round"/>
    <circle cx="28" cy="40" r="3.5" fill="url(#v2core)" stroke="url(#v2gold)" stroke-width="1.2"/>
  </g>

  <!-- Wordmark with flourishes -->
  <path d="M 100 50 Q 104 44 110 50" fill="none" stroke="url(#v2gold)" stroke-width="2" stroke-linecap="round"/>
  <path d="M 318 50 Q 322 56 328 50" fill="none" stroke="url(#v2gold)" stroke-width="2" stroke-linecap="round"/>
  <text x="210" y="48" text-anchor="middle" font-family="Georgia, serif" font-size="32" font-weight="700" fill="#2C2420" letter-spacing="5">KWANZOU</text>
  <text x="210" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="url(#v2gold)" letter-spacing="10">& ACCESSORIES &</text>
  <text x="210" y="86" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" font-weight="600" fill="#6B5E54" letter-spacing="4">STATEMENT JEWELRY · EGYPT</text>
</svg>
