<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Forgot Password | Kwanzou EG</title>
  <link rel="icon" href="assets/logo-brand.svg?v=5" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=11">
  <link rel="stylesheet" href="css/auth.css?v=3">
</head>
<body class="auth-page" data-page-title="forgot_title">
  <div class="auth-lang"><button type="button" class="lang-switch" id="langSwitch">English</button></div>
  <div class="auth-split">
    <div class="auth-visual">
      <img id="authVisualImage" src="https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?w=1200&q=80" alt="">
      <div class="auth-visual__overlay">
        <a href="index.html" class="logo-link-auth"><img src="assets/logo-brand.svg?v=5" alt="Kwanzou EG" class="auth-logo"></a>
        <p data-i18n="login_visual">Exquisite jewelry & accessories.</p>
      </div>
    </div>
    <div class="auth-form-panel">
      <a href="login.html" class="auth-back" data-i18n="forgot_back_login">← Back to Sign In</a>
      <div class="auth-form-wrap">
        <h1 data-i18n="forgot_heading">Forgot Password</h1>
        <p class="auth-sub" data-i18n="forgot_sub">Enter your email and we will send you a reset link.</p>
        <p class="auth-note" data-i18n="forgot_note">Use the same email you registered with. Check spam if you do not see it.</p>
        <div class="auth-alert" id="authError" hidden></div>
        <div class="auth-alert auth-alert--success" id="authSuccess" hidden></div>
        <form id="forgotForm" class="auth-form">
          <div class="form-group">
            <label for="email" data-i18n="login_email">Email</label>
            <input type="email" id="email" required autocomplete="email">
          </div>
          <button type="submit" class="btn btn-primary btn-full" data-i18n="forgot_submit">Send Reset Link</button>
        </form>
        <p class="auth-switch"><span data-i18n="register_have">Have account?</span> <a href="login.html" data-i18n="register_signin">Sign In</a></p>
      </div>
    </div>
  </div>

  <script src="js/store.js?v=15"></script>
  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (async () => {
      LumiereI18n.init();
      LumiereI18n.bindLangSwitch();
      await LumiereStore.init();
      LumiereAuth.initAuthBranding();
      window.addEventListener('lumiere:langchange', () => LumiereI18n.applyTranslations());

      document.getElementById('forgotForm').addEventListener('submit', async e => {
        e.preventDefault();
        const errEl = document.getElementById('authError');
        const okEl = document.getElementById('authSuccess');
        errEl.hidden = true;
        okEl.hidden = true;
        const result = await LumiereAuth.requestPasswordReset(document.getElementById('email').value);
        if (!result.ok) {
          errEl.textContent = LumiereI18n.t(result.error === 'mail_not_configured'
            ? 'forgot_mail_not_configured'
            : (result.error === 'mail_failed' ? 'forgot_mail_failed' : (result.error || 'reset_failed')));
          errEl.hidden = false;
          return;
        }
        okEl.textContent = LumiereI18n.t('reset_email_sent');
        okEl.hidden = false;
        e.target.querySelector('button').disabled = true;
      });
    })();
  </script>
</body>
</html>
