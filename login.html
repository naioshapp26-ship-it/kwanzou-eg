<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Sign In | LUMIÈRE</title>
  <link rel="icon" href="assets/logo.png?v=3" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/auth.css?v=2">
</head>
<body class="auth-page" data-page-title="login_title">
  <div class="auth-lang"><button type="button" class="lang-switch" id="langSwitch">English</button></div>
  <div class="auth-split">
    <div class="auth-visual">
      <img id="authVisualImage" src="https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?w=1200&q=80" alt="">
      <div class="auth-visual__overlay">
        <a href="index.html" class="logo-link-auth"><img src="assets/logo.png?v=3" alt="Kwanzou EG" class="auth-logo"></a>
        <p data-i18n="login_visual">Exquisite jewelry & accessories.</p>
      </div>
    </div>
    <div class="auth-form-panel">
      <a href="index.html" class="auth-back" data-i18n="login_back">← Back to Store</a>
      <div class="auth-form-wrap">
        <h1 data-i18n="login_welcome">Welcome Back</h1>
        <p class="auth-sub" data-i18n="login_sub">Sign in to your account.</p>
        <div class="auth-alert" id="authError" hidden></div>
        <form id="loginForm" class="auth-form">
          <div class="form-group">
            <label for="email" data-i18n="login_email">Email</label>
            <input type="email" id="email" required placeholder="you@example.com">
          </div>
          <div class="form-group">
            <label for="password" data-i18n="login_password">Password</label>
            <input type="password" id="password" required>
          </div>
          <button type="submit" class="btn btn-primary btn-full" data-i18n="login_submit">Sign In</button>
        </form>
        <div class="auth-demo">
          <p><strong data-i18n="login_demo">Demo Accounts:</strong></p>
          <button type="button" class="demo-btn" data-email="customer@lumiere.com" data-pass="demo123" data-i18n="login_demo_customer">Customer</button>
          <button type="button" class="demo-btn demo-btn--admin" data-email="admin@lumiere.com" data-pass="admin123" data-i18n="login_demo_admin">Super Admin</button>
        </div>
        <p class="auth-switch"><span data-i18n="login_no_account">No account?</span> <a href="register.html" data-i18n="login_create">Create one</a></p>
      </div>
    </div>
  </div>

  <script src="js/store.js?v=13"></script>
  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (async () => {
      LumiereI18n.init();
      LumiereI18n.bindLangSwitch();
      await LumiereStore.init();
      LumiereAuth.initAuthBranding();
      window.addEventListener('lumiere:langchange', () => LumiereI18n.applyTranslations());

      if (LumiereAuth.isLoggedIn()) {
      const s = LumiereAuth.getSession();
      window.location.href = s.role === 'superadmin' ? 'admin/index.html' : 'account.html';
    }

    const params = new URLSearchParams(location.search);
    const redirect = params.get('redirect');

    document.getElementById('loginForm').addEventListener('submit', e => {
      e.preventDefault();
      const result = LumiereAuth.login(document.getElementById('email').value, document.getElementById('password').value);
      const errEl = document.getElementById('authError');
      if (!result.ok) { errEl.textContent = LumiereI18n.t(result.error); errEl.hidden = false; return; }
      if (redirect) window.location.href = redirect;
      else if (result.user.role === 'superadmin') window.location.href = 'admin/index.html';
      else window.location.href = 'account.html';
    });

    document.querySelectorAll('.demo-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.getElementById('email').value = btn.dataset.email;
        document.getElementById('password').value = btn.dataset.pass;
      });
    });
    })();
  </script>
</body>
</html>
