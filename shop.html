<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Shop | Kwanzou EG</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=11">
  <link rel="stylesheet" href="css/shop.css?v=7">
  <link rel="stylesheet" href="css/catalog.css">
</head>
<body class="catalog-store" data-page-title="shop_title">
  <div id="site-header"></div>

  <main class="shop-page catalog-mode">
    <div class="container">
      <nav class="breadcrumb" id="breadcrumb"></nav>
      <div class="shop-header">
        <h1 id="shopTitle">Shop</h1>
        <p id="shopCount"></p>
      </div>
      <div class="shop-toolbar">
        <div class="shop-filters" id="shopFilters"></div>
        <select id="shopSort" class="shop-sort">
          <option value="featured" data-i18n="sort_featured">Featured</option>
          <option value="price-asc" data-i18n="sort_price_low">Price: Low to High</option>
          <option value="price-desc" data-i18n="sort_price_high">Price: High to Low</option>
          <option value="rating" data-i18n="sort_rating">Top Rated</option>
        </select>
      </div>
      <ul class="products" id="shopGrid"></ul>
      <p class="shop-empty" id="shopEmpty" hidden data-i18n="shop_empty">No products found.</p>
    </div>
  </main>

  <div id="site-footer"></div>
  <div class="toast" id="toast"><span id="toastMessage"></span></div>

  <script src="js/store.js?v=13"></script>
  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/layout.js?v=15"></script>
  <script src="js/shop.js?v=3"></script>
</body>
</html>
